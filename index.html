<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мой WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--tg-theme-text-color, #000000);
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 30px;
        }

        .status {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status.added {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.missed {
            display: block;
            background: #fff3e0;
            color: #ef6c00;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #999999);
            line-height: 1.5;
        }

        .version {
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999999);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Мой WebApp</h1>
        <p class="subtitle">Добавьте приложение на домашний экран для быстрого доступа</p>

        <div id="status" class="status"></div>

        <button id="addBtn" class="btn btn-primary">
            ➕ Добавить на домашний экран
        </button>

        <button id="checkBtn" class="btn btn-secondary">
            🔍 Проверить статус
        </button>

        <div class="info">
            <strong>Как это работает:</strong><br>
            Нажмите кнопку выше, чтобы создать ярлык. 
            После добавления вы сможете открывать приложение напрямую, 
            без входа в Telegram.
        </div>

        <div id="version" class="version"></div>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Элементы DOM
        const addBtn = document.getElementById('addBtn');
        const checkBtn = document.getElementById('checkBtn');
        const statusDiv = document.getElementById('status');
        const versionDiv = document.getElementById('version');

        // Показываем версию API
        versionDiv.textContent = `WebApp API v${tg.version}`;

        // Проверяем поддержку метода
        const isSupported = tg.isVersionAtLeast('7.0');
        
        if (!isSupported) {
            addBtn.disabled = true;
            addBtn.textContent = '❌ Требуется Telegram 7.0+';
            statusDiv.textContent = 'Ваша версия Telegram не поддерживает добавление ярлыков. Обновите приложение.';
            statusDiv.className = 'status missed';
        }

        // Функция обновления статуса
        function updateStatus(status) {
            statusDiv.style.display = 'block';
            
            if (status === 'added') {
                statusDiv.textContent = '✅ Ярлык уже добавлен на домашний экран';
                statusDiv.className = 'status added';
                addBtn.style.display = 'none';
            } else if (status === 'missed') {
                statusDiv.textContent = '⚠️ Ярлык ещё не добавлен';
                statusDiv.className = 'status missed';
            } else {
                statusDiv.textContent = '❓ Невозможно определить статус';
                statusDiv.className = 'status missed';
            }
        }

        // Добавление на домашний экран
        addBtn.addEventListener('click', () => {
            if (!isSupported) return;

            try {
                tg.addToHomeScreen();
                
                // Показываем подсказку пользователю
                tg.showPopup({
                    title: 'Готово!',
                    message: 'Следуйте инструкциям системы для добавления ярлыка на домашний экран.',
                    buttons: [{ text: 'Понятно' }]
                });

            } catch (error) {
                console.error('Ошибка добавления:', error);
                tg.showAlert('Не удалось добавить ярлык. Попробуйте вручную через меню браузера.');
            }
        });

        // Проверка статуса
        checkBtn.addEventListener('click', () => {
            if (!isSupported) {
                tg.showAlert('Функция недоступна в этой версии Telegram');
                return;
            }

            tg.checkHomeScreenStatus((status) => {
                console.log('Статус ярлыка:', status);
                updateStatus(status);
            });
        });

        // Проверяем статус при загрузке (с небольшой задержкой)
        if (isSupported) {
            setTimeout(() => {
                tg.checkHomeScreenStatus((status) => {
                    if (status === 'added') {
                        updateStatus('added');
                    }
                });
            }, 1000);
        }

        // Обработка события изменения видимости (если пользователь вернулся после добавления)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isSupported) {
                tg.checkHomeScreenStatus((status) => {
                    updateStatus(status);
                });
            }
        });
    </script>
</body>
</html>
